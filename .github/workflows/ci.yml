name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: marketplace-analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: MyPy
        run: mypy backend workers collectors automation warehouse scripts

      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f marketplace-analytics/backend/Dockerfile marketplace-analytics

      - name: Build worker image
        run: docker build -f marketplace-analytics/workers/Dockerfile marketplace-analytics

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      security-events: write
    defaults:
      run:
        working-directory: marketplace-analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependency audit tool
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Python dependency vulnerability scan
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Build backend image
        run: docker build -t marketplace-analytics-backend:ci -f backend/Dockerfile .

      - name: Build worker image
        run: docker build -t marketplace-analytics-worker:ci -f workers/Dockerfile .

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./marketplace-analytics
          format: spdx-json
          output-file: ./marketplace-analytics/source-sbom.spdx.json
          artifact-name: marketplace-analytics-source-sbom

      - name: Generate backend image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: marketplace-analytics-backend:ci
          format: spdx-json
          output-file: ./marketplace-analytics/backend-image-sbom.spdx.json
          artifact-name: marketplace-analytics-backend-image-sbom

      - name: Generate worker image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: marketplace-analytics-worker:ci
          format: spdx-json
          output-file: ./marketplace-analytics/worker-image-sbom.spdx.json
          artifact-name: marketplace-analytics-worker-image-sbom

      - name: Scan backend image
        id: scan-backend
        uses: anchore/scan-action@v7
        with:
          image: marketplace-analytics-backend:ci
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          cache-db: true

      - name: Upload backend SARIF
        if: always() && steps.scan-backend.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan-backend.outputs.sarif }}
          category: marketplace-analytics-backend-image

      - name: Scan worker image
        id: scan-worker
        uses: anchore/scan-action@v7
        with:
          image: marketplace-analytics-worker:ci
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          cache-db: true

      - name: Upload worker SARIF
        if: always() && steps.scan-worker.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan-worker.outputs.sarif }}
          category: marketplace-analytics-worker-image

  migration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: marketplace-analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare env
        run: |
          cp .env.example .env
          python - <<'PY'
          from pathlib import Path

          env_path = Path(".env")
          updates = {
              "STACK_NAME": "bormostats-ci",
              "CH_HTTP_HOST_PORT": "18123",
              "BOOTSTRAP_CH_HOST": "127.0.0.1",
              "BOOTSTRAP_CH_PORT": "18123",
              "BOOTSTRAP_CH_ADMIN_USER": "bootstrap_ci",
              "BOOTSTRAP_CH_ADMIN_PASSWORD": "ci-bootstrap-admin-password",
              "CH_USER": "analytics_ci",
              "CH_PASSWORD": "ci-clickhouse-password",
              "ADMIN_API_KEY": "ci-admin-api-key",
          }

          lines: list[str] = []
          seen: set[str] = set()
          for raw_line in env_path.read_text(encoding="utf-8").splitlines():
              stripped = raw_line.strip()
              if not stripped or stripped.startswith("#") or "=" not in raw_line:
                  lines.append(raw_line)
                  continue
              key, _, _ = raw_line.partition("=")
              if key in updates:
                  lines.append(f"{key}={updates[key]}")
                  seen.add(key)
                  continue
              lines.append(raw_line)

          for key, value in updates.items():
              if key not in seen:
                  lines.append(f"{key}={value}")

          env_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Start ClickHouse and Redis
        run: |
          cd infra/docker
          docker compose --env-file ../../.env -f docker-compose.yml up -d clickhouse redis

      - name: Wait for ClickHouse
        run: |
          set -a
          source .env
          set +a
          for i in {1..60}; do
            if curl -fsS "http://${BOOTSTRAP_CH_HOST}:${BOOTSTRAP_CH_PORT}/ping" >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cd infra/docker
          docker compose --env-file ../../.env -f docker-compose.yml logs clickhouse
          exit 1

      - name: Provision ClickHouse users
        run: |
          set -a
          source .env
          set +a
          APP_CH_USER="$CH_USER" \
          APP_CH_PASSWORD="$CH_PASSWORD" \
          APP_CH_DB="$CH_DB" \
          APP_CH_RO_USER="${CH_RO_USER:-}" \
          APP_CH_RO_PASSWORD="${CH_RO_PASSWORD:-}" \
          CH_HOST="${BOOTSTRAP_CH_HOST}" \
          CH_PORT="${BOOTSTRAP_CH_PORT}" \
          CH_USER="${BOOTSTRAP_CH_ADMIN_USER:-default}" \
          CH_PASSWORD="${BOOTSTRAP_CH_ADMIN_PASSWORD:-}" \
          python scripts/provision_clickhouse_users.py

      - name: Apply migrations
        run: |
          set -a
          source .env
          set +a
          CH_HOST="${BOOTSTRAP_CH_HOST}" \
          CH_PORT="${BOOTSTRAP_CH_PORT}" \
          python warehouse/apply_migrations.py

      - name: Verify schema
        run: |
          set -a
          source .env
          set +a
          python - <<'PY'
          import os
          import clickhouse_connect

          client = clickhouse_connect.get_client(
              host=os.getenv("BOOTSTRAP_CH_HOST", "127.0.0.1"),
              port=int(os.getenv("BOOTSTRAP_CH_PORT", "8123")),
              username=os.getenv("CH_USER", "default"),
              password=os.getenv("CH_PASSWORD", ""),
              database=os.getenv("CH_DB", "mp_analytics"),
          )
          try:
              rows = client.query(
                  """
                  SELECT name
                  FROM system.tables
                  WHERE database = %(db)s
                    AND name IN %(names)s
                  ORDER BY name
                  """,
                  parameters={
                      "db": os.getenv("CH_DB", "mp_analytics"),
                      "names": ("sys_schema_migrations", "sys_watermarks", "stg_sales", "mrt_sales_daily"),
                  },
              ).result_rows
              if len(rows) != 4:
                  raise SystemExit(f"Expected 4 key tables, got {rows}")
              applied = client.query("SELECT count() FROM sys_schema_migrations").result_rows
              if not applied or int(applied[0][0]) <= 0:
                  raise SystemExit("No migration versions were recorded in sys_schema_migrations")
              print("Schema verification passed")
          finally:
              client.close()
          PY

      - name: Stop services
        if: always()
        run: |
          cd infra/docker
          docker compose --env-file ../../.env -f docker-compose.yml down -v
