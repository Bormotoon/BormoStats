name: Feature request
description: Propose a product, infrastructure, or operator-experience improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What operator or product problem should be solved?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred outcome, not just implementation details.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: risks
    attributes:
      label: Risks or tradeoffs

