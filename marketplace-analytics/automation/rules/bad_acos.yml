name: bad_acos
query: |
  SELECT
    day,
    marketplace,
    account_id,
    campaign_id,
    acos,
    revenue,
    cost
  FROM mrt_ads_daily
  WHERE day = today() - 1
condition: row.get("revenue", 0) > 0 and row.get("acos", 0) > params.get("max_acos", 0.3)
params:
  max_acos: 0.3
actions:
  - type: telegram
    template: "High ACOS: {campaign_id} acos={acos} revenue={revenue} cost={cost}"
