name: ${STACK_NAME:-bormostats}

services:
  clickhouse:
    image: clickhouse/clickhouse-server@sha256:51beb66e790213a53ddacacf133d3067106f5aa0c446c5b40b9b0c3ae0cd39fc
    ports:
      - "${CH_HTTP_HOST_PORT:-18123}:8123"
    environment:
      - TZ=${TZ:-Europe/Warsaw}
      - CLICKHOUSE_DB=${CH_DB:-mp_analytics}
      - CLICKHOUSE_USER=${BOOTSTRAP_CH_ADMIN_USER:-default}
      - CLICKHOUSE_PASSWORD=${BOOTSTRAP_CH_ADMIN_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse/initdb:/docker-entrypoint-initdb.d:ro
      # optional configs:
      # - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      # - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis@sha256:ee64a64eaab618d88051c3ade8f6352d11531fcf79d9a4818b9b183d8c1d18ba
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ../../
      dockerfile: workers/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=4"]

  beat:
    build:
      context: ../../
      dockerfile: workers/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app:celery_app", "beat", "--loglevel=INFO"]

  metabase:
    image: metabase/metabase@sha256:0d6ac34cfc8b33b2d471ea4c10209c31e3fe073d53ad5c6a8e7da72d3087d6e5
    ports:
      - "${METABASE_HOST_PORT:-13000}:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - JAVA_TIMEZONE=${TZ:-Europe/Warsaw}
      # If plugins needed:
      # - MB_PLUGINS_DIR=/plugins
    volumes:
      - metabase_data:/metabase-data
      # Optional plugin dir:
      # - ./metabase/plugins:/plugins:ro
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  ch_data:
  redis_data:
  metabase_data:
