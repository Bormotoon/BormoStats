name: ${STACK_NAME:-bormostats}

x-app-runtime: &app-runtime
  restart: unless-stopped
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp

services:
  proxy:
    image: nginx:1.27.5-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    restart: unless-stopped
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"
      - "${BACKEND_TLS_HOST_PORT:-18443}:8443"
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/certs:/etc/nginx/certs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://127.0.0.1:8443/health | grep -q '\"status\":\"ok\"'",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: ["nginx", "-g", "daemon off;"]
    networks:
      - edge
      - private

  clickhouse:
    image: clickhouse/clickhouse-server@sha256:51beb66e790213a53ddacacf133d3067106f5aa0c446c5b40b9b0c3ae0cd39fc
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CH_HTTP_HOST_PORT:-18123}:8123"
    environment:
      - TZ=${TZ:-Europe/Warsaw}
      - CLICKHOUSE_DB=${CH_DB:-mp_analytics}
      - CLICKHOUSE_USER=${BOOTSTRAP_CH_ADMIN_USER:-default}
      - CLICKHOUSE_PASSWORD=${BOOTSTRAP_CH_ADMIN_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse/initdb:/docker-entrypoint-initdb.d:ro
      # optional configs:
      # - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/config.xml:ro
      # - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    mem_limit: ${CLICKHOUSE_MEMORY_LIMIT:-2g}
    mem_reservation: ${CLICKHOUSE_MEMORY_RESERVATION:-512m}
    cpus: ${CLICKHOUSE_CPU_LIMIT:-2.0}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ops
      - private

  redis:
    image: redis@sha256:ee64a64eaab618d88051c3ade8f6352d11531fcf79d9a4818b9b183d8c1d18ba
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    mem_limit: ${REDIS_MEMORY_LIMIT:-512m}
    mem_reservation: ${REDIS_MEMORY_RESERVATION:-128m}
    cpus: ${REDIS_CPU_LIMIT:-0.5}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 12
    networks:
      - private

  backend:
    <<: *app-runtime
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: ${BACKEND_MEMORY_LIMIT:-512m}
    mem_reservation: ${BACKEND_MEMORY_RESERVATION:-128m}
    cpus: ${BACKEND_CPU_LIMIT:-1.0}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - private

  worker:
    <<: *app-runtime
    build:
      context: ../../
      dockerfile: workers/Dockerfile
    env_file:
      - ../../.env
    environment:
      - CELERY_METRICS_ROLE=worker
      - CELERY_METRICS_PORT=9101
      - WORKER_PROMETHEUS_MULTIPROC_DIR=/tmp/marketplace-analytics-prometheus/worker
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WORKER_METRICS_HOST_PORT:-19101}:9101"
    mem_limit: ${WORKER_MEMORY_LIMIT:-1g}
    mem_reservation: ${WORKER_MEMORY_RESERVATION:-256m}
    cpus: ${WORKER_CPU_LIMIT:-2.0}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9101/metrics', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=4"]
    networks:
      - ops
      - private

  beat:
    <<: *app-runtime
    build:
      context: ../../
      dockerfile: workers/Dockerfile
    env_file:
      - ../../.env
    environment:
      - CELERY_METRICS_ROLE=beat
      - CELERY_METRICS_PORT=9102
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BEAT_METRICS_HOST_PORT:-19102}:9102"
    mem_limit: ${BEAT_MEMORY_LIMIT:-256m}
    mem_reservation: ${BEAT_MEMORY_RESERVATION:-64m}
    cpus: ${BEAT_CPU_LIMIT:-0.5}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9102/metrics', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    command:
      [
        "celery",
        "-A",
        "app.celery_app:celery_app",
        "beat",
        "--loglevel=INFO",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    networks:
      - ops
      - private

  metabase:
    image: metabase/metabase@sha256:0d6ac34cfc8b33b2d471ea4c10209c31e3fe073d53ad5c6a8e7da72d3087d6e5
    restart: unless-stopped
    ports:
      - "127.0.0.1:${METABASE_HOST_PORT:-13000}:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
      - JAVA_TIMEZONE=${TZ:-Europe/Warsaw}
      # If plugins needed:
      # - MB_PLUGINS_DIR=/plugins
    volumes:
      - metabase_data:/metabase-data
      # Optional plugin dir:
      # - ./metabase/plugins:/plugins:ro
    mem_limit: ${METABASE_MEMORY_LIMIT:-1g}
    mem_reservation: ${METABASE_MEMORY_RESERVATION:-256m}
    cpus: ${METABASE_CPU_LIMIT:-1.0}
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - ops
      - private

volumes:
  ch_data:
  redis_data:
  metabase_data:

networks:
  edge:
  ops:
  private:
    internal: true
