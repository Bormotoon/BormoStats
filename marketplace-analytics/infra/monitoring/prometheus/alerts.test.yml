rule_files:
  - alerts.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'task_runs_total{task_name="tasks.wb_collect.wb_sales_incremental",status="failed"}'
        values: "0+0x10 1+0x10"
      - series: 'watermark_lag_seconds{source="wb_sales",account_id="acc-1"}'
        values: "25000x20"
      - series: 'empty_payload_total{source="ozon_finance"}'
        values: "0+2x40"
      - series: "redis_memory_limit_bytes"
        values: "1024x40"
      - series: "redis_memory_utilization_ratio"
        values: "0.91x40"
      - series: 'service_readiness{service="redis"}'
        values: "0x40"
      - series: 'service_readiness{service="clickhouse"}'
        values: "0x40"
      - series: 'clickhouse_disk_free_ratio{disk="default"}'
        values: "0.10x40"
    alert_rule_test:
      - eval_time: 20m
        alertname: MarketplaceTaskFailures
        exp_alerts:
          - exp_labels:
              severity: warning
              task_name: tasks.wb_collect.wb_sales_incremental
            exp_annotations:
              summary: Task failures detected
              description: tasks.wb_collect.wb_sales_incremental has recorded failed runs during the last 15 minutes.
      - eval_time: 20m
        alertname: MarketplaceWatermarkStale
        exp_alerts:
          - exp_labels:
              severity: warning
              source: wb_sales
              account_id: acc-1
            exp_annotations:
              summary: Watermark lag is stale
              description: wb_sales/acc-1 watermark lag is above 6 hours.
      - eval_time: 30m
        alertname: MarketplaceEmptyPayloadAnomaly
        exp_alerts:
          - exp_labels:
              severity: warning
              source: ozon_finance
            exp_annotations:
              summary: Empty payload anomaly detected
              description: Collector sources returned empty payloads more than 20 times during the last hour.
      - eval_time: 20m
        alertname: RedisMemorySaturation
        exp_alerts:
          - exp_labels:
              severity: critical
            exp_annotations:
              summary: Redis memory saturation
              description: Redis memory utilization is above 80 percent of configured maxmemory.
      - eval_time: 20m
        alertname: RedisUnavailable
        exp_alerts:
          - exp_labels:
              severity: critical
              service: redis
            exp_annotations:
              summary: Redis readiness failed
              description: Backend scrape could not reach Redis successfully.
      - eval_time: 20m
        alertname: ClickHouseUnavailable
        exp_alerts:
          - exp_labels:
              severity: critical
              service: clickhouse
            exp_annotations:
              summary: ClickHouse readiness failed
              description: Backend scrape could not reach ClickHouse successfully.
      - eval_time: 20m
        alertname: ClickHouseDiskPressure
        exp_alerts:
          - exp_labels:
              severity: critical
              disk: default
            exp_annotations:
              summary: ClickHouse disk pressure
              description: default free disk ratio is below 15 percent.
